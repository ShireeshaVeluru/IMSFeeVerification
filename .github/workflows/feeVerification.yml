name: IMS Fee Verification Suite

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target Environment
        required: true
        default: qa
        type: choice
        options:
          - qa
          - staging
          - prod

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'qa' }}

# checks: write is required for dorny/test-reporter to publish the
# annotated test summary (Error 1/2 can also surface as a permissions
# failure if this is missing).
permissions:
  contents: read
  actions: read
  checks: write

jobs:
  fee-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ims-fee-verification-suite
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # v1 -> v2: v1 still ships a Node 20 runtime, which triggers the
      # "Node.js 20 is deprecated" warning now that Actions defaults to
      # Node 24.
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Create Output Folders
        run: |
          mkdir -p reports
          mkdir -p screenshots
          mkdir -p logs

      - name: Run Fee Verification Suite
        run: mvn -B clean test -Denv=${{ env.TARGET_ENV }}

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: extent-report-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: failure-screenshots-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: execution-logs-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Debug Surefire Reports
        if: always()
        run: |
          echo "Current Directory:"
          pwd
          echo "Listing target folder"
          ls -R target || true
          echo "Listing surefire reports"
          ls -R target/surefire-reports || true
          echo "Printing XML files"
          find target -name "*.xml" || true

      - name: Publish Test Summary
        if: always()
        working-directory: ims-fee-verification-suite
        run: |
          RESULTS_FILE="target/surefire-reports/testng-results.xml"

          if [ -f "$RESULTS_FILE" ]; then
            TOTAL=$(grep -oP 'total="\K[0-9]+' "$RESULTS_FILE" | head -1)
            PASSED=$(grep -oP 'passed="\K[0-9]+' "$RESULTS_FILE" | head -1)
            FAILED=$(grep -oP 'failed="\K[0-9]+' "$RESULTS_FILE" | head -1)
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$RESULTS_FILE" | head -1)
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          fi

          {
            echo "### Fee Verification Summary (${{ env.TARGET_ENV }})"
            echo '```'
            echo "total:${TOTAL}"
            echo "passed:${PASSED}"
            echo "failed:${FAILED}"
            echo "skipped:${SKIPPED}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
