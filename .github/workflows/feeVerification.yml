name: IMS Fee Verification Suite

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target Environment
        required: true
        default: qa
        type: choice
        options:
          - qa
          - staging
          - prod

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'qa' }}

# checks: write is required for dorny/test-reporter to publish the
# annotated test summary (Error 1/2 can also surface as a permissions
# failure if this is missing).
permissions:
  contents: read
  actions: read
  checks: write

jobs:
  fee-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ims-fee-verification-suite
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # v1 -> v2: v1 still ships a Node 20 runtime, which triggers the
      # "Node.js 20 is deprecated" warning now that Actions defaults to
      # Node 24.
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Create Output Folders
        run: |
          mkdir -p reports
          mkdir -p screenshots
          mkdir -p logs

      - name: Run Fee Verification Suite
        run: mvn -B clean test -Denv=${{ env.TARGET_ENV }}

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs-${{ env.TARGET_ENV }}
          path: ims-fee-verification-suite/logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Debug Surefire Reports
        if: always()
        run: |
          echo "Current Directory:"
          pwd
          echo "Listing target folder"
          ls -R target || true
          echo "Listing surefire reports"
          ls -R target/surefire-reports || true
          echo "Printing XML files"
          find target -name "*.xml" || true

      # v1 -> v3: v1 still ships a Node 20 runtime (deprecation warning).
      # path narrowed from *.xml to TEST-*.xml: Maven Surefire writes both
      # JUnit-format files (TEST-com.foo.Bar.xml — what the java-junit
      # parser expects) AND TestNG's own summary files (testng-results.xml,
      # testng-failed.xml) into the same folder. The old *.xml glob picked
      # up the TestNG summary files too; their schema doesn't match JUnit,
      # which is exactly what threw "Cannot read properties of undefined
      # (reading '$')" and the "Processing test results ... failed" error.
      - name: Publish Test Summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: Fee Verification Results (${{ env.TARGET_ENV }})
          path: ims-fee-verification-suite/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
